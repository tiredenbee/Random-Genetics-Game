<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Genetics Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="top-controls">
        <div class="nav-group main-tabs">
            <button class="tab-btn active" onclick="switchTab('focus')">Focus View</button>
            <button class="tab-btn" onclick="switchTab('males')">Males</button>
            <button class="tab-btn" onclick="switchTab('females')">Females</button>
        </div>
        <div class="action-group" style="display: flex; gap: 10px;">
            <button class="corner-btn success" onclick="generateRandomCat()">Rescue Cat</button>
            <button class="corner-btn luck" onclick="breedSelected()">Breed Selected</button>
        </div>
    </div>

    <main class="game-container">
        <section id="focus-area" class="tab-content active">
            <div class="layout-wrapper" style="flex-direction: column; align-items: center;">
                <div id="active-cat-display" class="glass-card full-width-card">
                    <p style="text-align: center; color: var(--text-dim); padding: 40px;">Rescue or Breed a cat to see them here!</p>
                </div>
            </div>
        </section>

        <section id="males-area" class="tab-content">
            <div class="glass-card">
                <h2 class="section-title">Male Cattery</h2>
                <div class="automation-grid" id="males-grid"></div>
            </div>
        </section>

        <section id="females-area" class="tab-content">
            <div class="glass-card">
                <h2 class="section-title">Female Cattery</h2>
                <div class="automation-grid" id="females-grid"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
