<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Geneticist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="header-row">
            <h1>Cat Geneticist</h1>
            <button id="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
        
        <div id="controls">
            <button onclick="generateRandomCat()">Rescue a Cat</button>
            <button class="breed-btn" onclick="breedSelected()">Breed Selected Cats</button>
        </div>

        <div id="cattery" class="cat-grid">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
