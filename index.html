<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat Genetics Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="tabs">
        <div class="nav-group">
            <button class="tab-btn active" onclick="switchTab('focus')">Focus View</button>
            <button class="tab-btn" onclick="switchTab('males')">Males</button>
            <button class="tab-btn" onclick="switchTab('females')">Females</button>
            <button class="tab-btn" onclick="switchTab('full-pedigree')">Full Pedigree</button>
        </div>
    </nav>

    <div class="game-container">
        <div id="controls" class="centered-controls">
            <button class="corner-btn success" onclick="generateRandomCat()">Rescue a Cat</button>
            <button class="corner-btn luck" onclick="breedSelected()">Breed Selected</button>
        </div>

        <div id="focus-area" class="tab-content active">
            <div class="workspace-layout">
                <div class="focus-main">
                    <div id="active-cat-display" class="glass-card">
                        <p style="text-align: center; color: var(--text-dim); padding: 50px;">Rescue or select a cat to begin.</p>
                    </div>
                </div>
                
                <div class="breeding-sidebar glass-card">
                    <h3 class="section-title">Quick Select</h3>
                    <div id="sidebar-males" class="sidebar-scroll">
                        <small>Males</small>
                        <div class="sidebar-grid" id="side-m-grid"></div>
                    </div>
                    <div id="sidebar-females" class="sidebar-scroll">
                        <small>Females</small>
                        <div class="sidebar-grid" id="side-f-grid"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="males-area" class="tab-content">
            <div class="automation-grid" id="males-grid"></div>
        </div>
        <div id="females-area" class="tab-content">
            <div class="automation-grid" id="females-grid"></div>
        </div>
        
        <div id="full-pedigree-area" class="tab-content">
            <div class="glass-card full-pedigree-viewer" id="full-tree-container">
                <h2 class="section-title">Global Breeding Tree</h2>
                <div id="global-tree-root"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
