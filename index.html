<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cat Genetics Lab | Research Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="tabs">
        <div class="nav-group">
            <button class="tab-btn active" onclick="switchTab('focus')">Focus View</button>
            <button class="tab-btn" onclick="switchTab('males')">Male Cattery</button>
            <button class="tab-btn" onclick="switchTab('females')">Female Cattery</button>
            <button class="tab-btn" onclick="switchTab('pedigree')">Full Pedigree</button>
        </div>
    </nav>

    <div class="game-container">
        <div class="centered-header">
            <button class="action-btn success-btn" onclick="generateRandomCat()">Rescue Cat</button>
            <button class="action-btn breed-btn" onclick="breedSelected()">Breed Selected</button>
        </div>

        <section id="focus-tab" class="tab-content active">
            <div class="workspace-grid">
                <div class="focus-panel">
                    <div id="active-cat-display" class="glass-card main-display">
                        <p class="empty-msg">Rescue or select a cat to view genetic data</p>
                    </div>
                </div>

                <aside class="breeding-sidebar glass-card">
                    <h3 class="sidebar-title">Quick Selection</h3>
                    <div class="sidebar-section">
                        <span class="gender-label">Males</span>
                        <div id="side-males-grid" class="mini-grid"></div>
                    </div>
                    <div class="sidebar-section">
                        <span class="gender-label">Females</span>
                        <div id="side-females-grid" class="mini-grid"></div>
                    </div>
                </aside>
            </div>
        </section>

        <section id="males-tab" class="tab-content">
            <div class="automation-grid" id="males-grid"></div>
        </section>

        <section id="females-tab" class="tab-content">
            <div class="automation-grid" id="females-grid"></div>
        </section>

        <section id="pedigree-tab" class="tab-content">
            <div class="glass-card full-pedigree-container">
                <h2 class="section-title">Global Breeding History</h2>
                <div id="global-tree-display" class="tree-viewer"></div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
